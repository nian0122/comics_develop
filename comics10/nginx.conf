proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m inactive=7d max_size=10g;

server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    location /api/ {
        proxy_pass http://web:500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/image/.* {
        proxy_pass http://web:500;        
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    

    location ~ ^/hq_image/(.*)$ {
        rewrite ^/hq_image/(.*)$ /comics/h_photograph/$1 break;
        
        root /; 

        try_files $uri =404; 
        
        sendfile on;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ----------------------------------------
    # 3. 🚀 视频文件请求优化 (Nginx 直接服务)
    # ----------------------------------------
    location ~ ^/video/.* {
        rewrite ^/video/(.*)$ /comics/h_photograph/$1 break;
        root /; 
        try_files $uri =404;
        
        sendfile on;
        
        expires 7d;
        add_header Cache-Control "public";
    }
}