version: '3.8'

# 开发环境配置
# 特点：热重载、本地挂载、调试友好

services:
  nginx:
    image: nginx:stable-alpine
    container_name: comic15_nginx_dev
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
      - &comic_mount F:\games\comics:/comics:ro
    depends_on:
      - web

  web:
    build:
      context: ./backend/comic
    container_name: comic15_server_dev
    ports:
      - "500:500"
    volumes:
      - *comic_mount
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - COMICS_ROOT_DIR=/comics

  redis:
    image: redis:7-alpine
    container_name: comic15_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  nginx_cache: