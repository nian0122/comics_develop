services:
  nginx:
    build:
      context: ./frontend
    container_name: comic15_nginx
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - &comic_mount F:\games\comics:/comics:ro
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: comic15_backend
    volumes:
      - *comic_mount
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - COMICS_ROOT_DIR=/comics

  redis:
    image: redis:7-alpine
    container_name: comic15_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  nginx_cache: