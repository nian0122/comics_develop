<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>工具管理 - 漫画阅读器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* 工具页面独立布局，覆盖 components.css 的 fixed 定位 */
        .tools-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        
        .tools-sidebar {
            width: var(--sidebar-width);
            position: relative;
            flex-shrink: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .tools-main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        .tools-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-top: 80px;
            padding-bottom: 60px;
        }
        
        .tools-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 24px;
            z-index: var(--z-sticky);
        }
        
        .tools-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 20px;
            z-index: var(--z-sticky);
        }
        
        .tools-scroll-box {
            height: 200px;
            min-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="tools-layout">

        <aside class="tools-sidebar glass-strong">
            <div class="flex items-center justify-between">
                <div class="section-label">可用工具</div>
                <a href="/" class="glass-btn text-xs px-3 py-1">返回阅读</a>
            </div>
            <div id="toolsList" class="tools-scroll-box rounded-xl bg-[var(--bg-sidebar)] border border-[var(--border)] p-2">
                <div class="loading-indicator">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                    正在加载工具列表...
                </div>
            </div>

            <hr>

            <div class="section-label">执行历史</div>
            <div id="executionsList" class="tools-scroll-box rounded-xl bg-[var(--bg-sidebar)] border border-[var(--border)] p-2">
                <div class="status-text text-center p-4">暂无执行记录</div>
            </div>

            <button id="cleanupBtn" class="glass-btn w-full" style="display:none;">
                清理已完成记录
            </button>
        </aside>

        <main class="tools-main">

            <header class="tools-header glass">
                <div class="header-content">
                    <div id="toolTitle" class="title flex-1 text-left pl-4">选择工具</div>
                    <button id="runBtn" class="primary-btn" style="display:none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-1">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        执行
                    </button>
                    <button id="cancelBtn" class="glass-btn text-red-500" style="display:none;">
                        取消
                    </button>
                </div>
            </header>

            <div class="tools-content">
                <div id="empty" class="empty-state glass rounded-2xl mx-6 my-6">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3 0l-3-3a2.12 2.12 0 0 1 0-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"></path>
                    </svg>
                    <div class="empty-state-title">从左侧选择工具</div>
                    <div class="empty-state-desc">选择要执行的工具并配置参数</div>
                </div>

                <div id="configPanel" class="glass rounded-2xl p-6 hidden">
                    <div id="toolDescription" class="text-sm text-[var(--text-secondary)] mb-6"></div>
                    <div id="paramsForm" class="space-y-4"></div>
                </div>

                <div id="logPanel" class="glass rounded-2xl p-4 hidden" style="min-height: calc(100vh - 180px);">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div id="statusBadge" class="px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-600">运行中</div>
                            <span id="durationText" class="status-text"></span>
                        </div>
                        <div id="progressStats" class="text-xs text-[var(--text-secondary)]"></div>
                    </div>
                    <div id="logOutput" class="overflow-y-auto font-mono text-xs bg-[var(--bg-tertiary)] rounded-lg p-3 whitespace-pre-wrap" style="max-height: calc(100vh - 260px);"></div>
                </div>
            </div>

            <footer class="tools-footer glass">
                <div class="flex flex-row justify-between items-center">
                    <div id="footerStatus" class="status-text">工具管理页面</div>
                    <div class="status-text">漫画阅读器</div>
                </div>
            </footer>

        </main>
    </div>

    <script type="module" src="js/tools-main.js"></script>
</body>
</html>
