<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>漫画阅读器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div id="preloader-container"></div>

    <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

    <div class="flex h-screen overflow-hidden">

        <button id="toggleSidebarBtn" aria-label="切换侧边栏">
            <svg id="menuIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            <svg id="closeIcon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <aside id="sidebar" class="glass-strong">
            <div class="section-label">漫画系列</div>
            <div id="seriesWrapper">
                <div id="seriesList">
                    <div class="loading-indicator">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                        正在加载...
                    </div>
                </div>
            </div>

            <hr>

            <div class="section-label">章节目录</div>
            <input id="filter" class="glass-input" placeholder="搜索章节..." />
            <div id="chaptersWrapper">
                <div id="chapters">
                    <div class="status-text" style="text-align: center; padding: 20px;">选择一个系列</div>
                </div>
            </div>

            <hr>

            <a href="tools.html" class="list-item mt-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-3">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3 0l-3-3a2.12 2.12 0 0 1 0-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"></path>
                </svg>
                <span class="text-sm">工具管理</span>
            </a>
        </aside>

        <main class="main flex-grow flex flex-col overflow-hidden relative">

            <header class="header glass">
                <div class="header-content">
                    <button id="prevBtn" class="nav-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button id="scrollTop" class="nav-btn nav-btn-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                    <button id="nextBtn" class="nav-btn nav-btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                    <div class="scale-control">
                        <input id="scaleRange" type="range" min="30" max="150" value="100">
                        <span id="scaleLabel" class="scale-label">100%</span>
                    </div>
                </div>
            </header>

            <div id="reader" class="reader flex-grow overflow-y-auto outline-none" tabindex="0">
                <div id="empty" class="empty-state glass rounded-2xl mx-6 my-6">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18s-3.332.477-4.5 1.253"></path>
                    </svg>
                    <div class="empty-state-title">选择漫画开始阅读</div>
                    <div class="empty-state-desc">从侧边栏选择系列和章节</div>
                </div>
            </div>

            <footer class="footer glass">
                <div class="flex flex-row justify-between items-center">
                    <div class="status-text" id="status">未加载</div>
                    <div class="flex items-center gap-3">
                        <button id="retryFailedBtn" class="status-text hover:text-[var(--text-primary)] transition-colors px-2 py-1 rounded-lg hover:bg-[var(--bg-hover)]" style="display:none;">
                            重试失败
                        </button>
                        <div class="progress-text cursor-default" id="progressStatus">0 / 0</div>
                    </div>
                    <div class="status-text">本地阅读器</div>
                </div>
            </footer>

            <div id="jumpModal" class="fixed inset-0 z-[60] hidden items-center justify-center">
                <div class="glass-strong rounded-2xl p-6 w-80 shadow-2xl">
                    <div class="text-center mb-5">
                        <div class="title text-lg mb-1">跳转页码</div>
                        <div class="chapter-title">共 <span id="totalPages">0</span> 页</div>
                    </div>
                    <input id="jumpPageInput" type="number" min="1"
                           class="glass-input text-center text-lg mb-5"
                           placeholder="输入页码">
                    <div class="flex gap-3">
                        <button id="jumpCancelBtn" class="glass-btn flex-1">取消</button>
                        <button id="jumpConfirmBtn" class="primary-btn flex-1">跳转</button>
                    </div>
                    <div class="mt-4 text-center">
                        <span class="status-text">按 G 键快速跳转</span>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
