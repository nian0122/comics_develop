# 生产就绪的简化 nginx 配置
server {
    listen 80;
    server_name localhost;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # API 代理 (仅目录服务)
    location /api/ {
        proxy_pass http://backend:500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # LQ 图片静态服务 (WebP 低质量预览)
    # 文件不存在时返回 204 No Content，让前端回退到 HQ
    location ^~ /lq_image/ {
        alias /comics/l_photograph/;
        try_files $uri @lq_not_found;

        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        tcp_nopush on;
    }

    # LQ 图片不存在时返回 204 (无错误，前端回退 HQ)
    location @lq_not_found {
        return 204;
    }

    # HQ 图片静态服务
    location ^~ /hq_image/ {
        alias /comics/h_photograph/;
        try_files $uri =404;

        expires 60d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        tcp_nopush on;
    }

    # 视频/GIF 静态服务
    location /video/ {
        alias /comics/h_photograph/;
        try_files $uri =404;

        expires 30d;
        add_header Cache-Control "public";
        add_header X-Cache-Status "STATIC";

        sendfile on;
        tcp_nopush on;

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range' always;

        if ($request_method = 'OPTIONS') {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 前端资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # HTML 文件不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
    
    # 性能优化
    client_max_body_size 10G;
    keepalive_timeout 65;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}