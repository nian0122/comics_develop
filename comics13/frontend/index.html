<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地漫画阅读器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 燕麦色+象牙白有机柔和渐变风格 - 现代简约版 */
        
        /* ===== 字体系统 ===== */
        :root {
            font-family: 'Helvetica Neue', 'Helvetica', 'Arial', 'Roboto', 'Circular', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-size-display: 2.5rem;      /* 28px - 大标题 */
            --font-size-h1: 1.875rem;         /* 24px - 主标题 */
            --font-size-h2: 1.5rem;           /* 20px - 次标题 */
            --font-size-h3: 1.25rem;         /* 18px - 章节标题 */
            --font-size-body: 0.9375rem;      /* 15px - 正文 */
            --font-size-small: 0.8125rem;      /* 13px - 次要内容 */
            --font-size-caption: 0.75rem;     /* 12px - 辅助文字 */
            
            --font-weight-light: 300;
            --font-weight-regular: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
        }
        
        /* ===== 基础样式 ===== */
        body {
            background: linear-gradient(135deg, #f5f0e6 0%, #e8dfd0 30%, #d4c9b8 60%, #c9b99a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #5c5547;
            font-weight: var(--font-weight-light);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* ===== 玻璃效果 ===== */
        .glass {
            background: rgba(255, 255, 250, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(139, 119, 101, 0.12);
        }
        
        .glass-strong {
            background: rgba(255, 255, 250, 0.28);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(139, 119, 101, 0.15);
        }
        
        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 119, 101, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 119, 101, 0.5);
        }
        ::-webkit-scrollbar-track {
            background: rgba(139, 119, 101, 0.08);
        }
        
        /* ===== 标题层级 ===== */
        .title {
            font-size: var(--font-size-h1);
            font-weight: var(--font-weight-semibold);
            letter-spacing: -0.02em;
            color: #4a4032;
        }
        
        .chapter-title {
            font-size: var(--font-size-body);
            font-weight: var(--font-weight-light);
            color: #8b7765;
            letter-spacing: 0.02em;
        }
        
        .section-label {
            font-size: var(--font-size-caption);
            font-weight: var(--font-weight-medium);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #8b7765;
            opacity: 0.8;
        }
        
        /* ===== 侧边栏列表 ===== */
        .list-item {
            padding: 10px 16px;
            padding-left: 20px;
            margin: 3px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 8px;
            font-size: var(--font-size-body);
            font-weight: var(--font-weight-light);
            color: #6b5d4d;
            display: flex;
            align-items: center;
            background: transparent;
        }
        .list-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(3px);
        }

        .chapter-dot {
            width: 6px;
            height: 6px;
            min-width: 6px; 
            min-height: 6px; 
            background-color: rgba(139, 119, 101, 0.4);
            border-radius: 50%;
            margin-right: 12px;
            transition: all 0.2s ease;
        }

        .series-item.selected {
            background: linear-gradient(90deg, rgba(201, 185, 154, 0.4), rgba(201, 185, 154, 0.2));
            font-weight: var(--font-weight-medium);
            color: #4a4032;
        }
        .series-item.selected .chapter-dot {
            background-color: #8b7765;
        }

        .chapter-item.selected {
            background: linear-gradient(90deg, rgba(201, 185, 154, 0.5), rgba(201, 185, 154, 0.3));
            font-weight: var(--font-weight-medium);
            color: #4a4032;
        }
        .chapter-item.selected .chapter-dot {
            background-color: #8b7765;
            box-shadow: 0 0 6px rgba(139, 119, 101, 0.4);
        }

        .volume-title {
            padding: 12px 16px 8px 16px;
            font-size: var(--font-size-caption);
            font-weight: var(--font-weight-semibold);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
            transition: all 0.2s ease;
            color: #8b7765;
            opacity: 0.7;
        }
        .volume-title:hover {
            color: #5c5547;
            opacity: 1;
        }
        
        .volume-title .toggle-icon {
            margin-right: 8px;
            font-size: 0.625rem;
            min-width: 10px;
        }
        
        .volume-title.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        
        /* ===== 布局比例 ===== */
        .series-ratio-2 {
            flex: 2;
            min-height: 0;
        }
        .chapters-ratio-3 {
            flex: 3;
            min-height: 0;
        }

        /* ===== 阅读器 ===== */
        .reader-img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 24px rgba(139, 119, 101, 0.15);
            background-color: rgba(255, 255, 250, 0.3);
        }
        
        #preloader-container {
            position: absolute;
            top: -9999px;
            left: -9999px; 
            overflow: hidden;
            height: 1px;
            width: 1px;
        }
        
        #reader {
             padding: 0;
             background: transparent;
             min-height: calc(100vh - 12rem);
        }

        .header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }
        .footer.hidden {
            transform: translateY(100%);
            opacity: 0;
        }
        .header, .footer {
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }
        
        /* ===== 侧边栏悬浮 ===== */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 18rem;
            z-index: 50;
            transform: translateX(0);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar.hidden {
            transform: translateX(-100%);
        }
        
        /* Toggle按钮始终显示 */
        #toggleSidebarBtn {
            position: fixed;
            left: 16px;
            top: 16px;
            z-index: 100;
            display: flex !important;
        }
        
        /* Reader占满全屏 */
        .main {
            position: fixed;
            inset: 0;
            z-index: 10;
            margin: 0;
        }
        
        .header {
            z-index: 30;
        }
        
        .footer {
            z-index: 30;
        }
        
        /* ===== 按钮样式 ===== */
        .glass-btn {
            background: rgba(255, 255, 250, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            padding: 10px 24px;
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-medium);
            letter-spacing: 0.03em;
            transition: all 0.2s ease;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 250, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 119, 101, 0.15);
        }
        .glass-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        .primary-btn {
            background: linear-gradient(135deg, #c9b99a 0%, #8b7765 100%);
            color: white;
            font-weight: var(--font-weight-medium);
            padding: 12px 28px;
            box-shadow: 0 4px 16px rgba(139, 119, 101, 0.3);
        }
        .primary-btn:hover {
            background: linear-gradient(135deg, #d4c9b8 0%, #9b8775 100%);
            box-shadow: 0 6px 20px rgba(139, 119, 101, 0.4);
        }
        
        /* ===== 输入框 ===== */
        .glass-input {
            background: rgba(255, 255, 250, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            padding: 12px 16px;
            font-size: var(--font-size-body);
            font-weight: var(--font-weight-light);
            color: #5c5547;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 250, 0.3);
            outline: none;
            box-shadow: 0 0 0 2px rgba(201, 185, 154, 0.3);
        }
        .glass-input::placeholder {
            color: rgba(92, 85, 71, 0.4);
            font-weight: var(--font-weight-light);
        }
        
        /* ===== 滑块 ===== */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(139, 119, 101, 0.15);
            border-radius: 3px;
            height: 4px;
            width: 120px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            background: linear-gradient(135deg, #c9b99a, #8b7765);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(139, 119, 101, 0.3);
            transition: all 0.2s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 12px rgba(139, 119, 101, 0.5);
        }
        
        /* ===== 状态文字 ===== */
        .status-text {
            font-size: var(--font-size-caption);
            font-weight: var(--font-weight-light);
            letter-spacing: 0.05em;
            color: #8b7765;
            opacity: 0.8;
        }
        
        .progress-text {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-medium);
            color: #5c5547;
        }
        
        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }
        .empty-state-title {
            font-size: var(--font-size-h3);
            font-weight: var(--font-weight-semibold);
            color: #4a4032;
            margin-bottom: 0.5rem;
        }
        .empty-state-desc {
            font-size: var(--font-size-body);
            font-weight: var(--font-weight-light);
            color: #8b7765;
            opacity: 0.7;
        }
        
        /* ===== 加载指示器 ===== */
        .loading-indicator {
            text-align: center;
            padding: 2rem;
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-light);
            letter-spacing: 0.1em;
            color: #8b7765;
        }
        .loading-indicator svg {
            width: 24px;
            height: 24px;
            margin-bottom: 0.75rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 弹窗动画 */
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        #jumpModal:not(.hidden) > div {
            animation: modalIn 0.2s ease-out;
        }

        /* ===== 骨架屏动画 ===== */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .skeleton {
            background: linear-gradient(
                90deg,
                rgba(201, 185, 154, 0.1) 25%,
                rgba(201, 185, 154, 0.3) 50%,
                rgba(201, 185, 154, 0.1) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-text {
            height: 1em;
            background: rgba(139, 119, 101, 0.15);
            border-radius: 4px;
            margin: 8px 0;
        }
        .skeleton-image {
            width: 100%;
            height: 300px;
            border-radius: 8px;
        }
        .skeleton-wrapper {
            padding: 4px;
        }

        /* ===== 无限滚动 Sentinels ===== */
        #infinite-sentinel {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #end-sentinel {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b7765;
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-light);
            letter-spacing: 0.1em;
            opacity: 0.7;
        }

        /* ===== 渐进式图片加载动画 ===== */
        .progressive-image {
            position: relative;
            overflow: hidden;
        }
        .progressive-image .placeholder {
            filter: blur(20px);
            transform: scale(1.1);
            transition: opacity 0.3s ease;
        }
        .progressive-image .full-image {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .progressive-image.loaded .placeholder {
            opacity: 0;
        }
        .progressive-image.loaded .full-image {
            opacity: 1;
        }

        /* ===== 图片加载过渡 ===== */
        .reader-img {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .reader-img.loading {
            opacity: 0.7;
        }
        .reader-img.loaded {
            opacity: 1;
        }
        .reader-img.error {
            filter: grayscale(100%);
        }

        /* ===== 滚动加载指示器 ===== */
        .scroll-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }
        .scroll-loader .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(139, 119, 101, 0.2);
            border-top-color: #8b7765;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .scroll-loader .text {
            margin-top: 8px;
            font-size: var(--font-size-small);
            color: #8b7765;
            letter-spacing: 0.1em;
        }
        
        /* ===== 懒加载容器样式 ===== */
        .lazy-image-container {
            position: relative;
            min-height: 200px;
            margin-bottom: 0;
            background: rgba(201, 185, 154, 0.1);
        }
        
        .lazy-image-container .skeleton-wrapper {
            padding: 4px;
        }
        
        .lazy-image-container .skeleton-image {
            width: 100%;
            height: 200px;
            border-radius: 8px;
        }
        
        .lazy-image-container .reader-img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .lazy-image-container.loaded .reader-img {
            opacity: 1;
        }
        
        .lazy-image-container.loaded .skeleton-wrapper {
            display: none;
        }
    </style>
</head>
<body class="antialiased" style="color: #5c5547;">

    <div id="preloader-container"></div> 
    <div class="flex h-screen overflow-hidden">
        <button id="toggleSidebarBtn" class="fixed top-4 left-4 z-100 p-3 glass rounded-full shadow-lg" style="color: #8b7765;">
            ☰
        </button>

        <div id="sidebar" 
             class="sidebar fixed inset-y-0 left-0 w-72 glass-strong rounded-r-2xl
                    p-4 flex flex-col z-50 transition-transform duration-300 ease-in-out"> 
            <div class="section-label mb-4 px-2">漫画系列</div>
            <div id="seriesWrapper" class="series-ratio-2 overflow-y-auto mb-4 glass rounded-xl p-2">
                <div id="seriesList" class="list-block space-y-1">
                    <div class="p-2 text-gray-500">正在加载...</div>
                </div>
            </div>
            
            <hr style="border: none; height: 1px; background: rgba(139, 119, 101, 0.15); margin: 16px 0;">
            
            <div class="section-label mt-2 mb-3 px-2">章节目录</div>
            <input id="filter" class="search w-full glass-input rounded-lg mb-4" placeholder="过滤章节名..." />
            <div id="chaptersWrapper" class="chapters-ratio-3 overflow-y-auto glass rounded-xl p-2">
                <div id="chapters" class="list-block space-y-1">
                    <div class="status-text" style="text-align: center;">请选择一个系列</div>
                </div>
            </div>
        </div>

        <div class="main flex-grow flex flex-col overflow-hidden relative">
            
            <div class="header absolute top-0 left-0 right-0 z-30 glass rounded-b-xl px-4 py-2 transition-all duration-300 ease-out transform"
                 style="transform: translateY(0);">
                <div class="flex flex-col items-center">
                    <div class="flex flex-col items-center mb-2">
                        <div class="title text-base" id="seriesTitle">本地漫画阅读器</div>
                        <div class="chapter-title text-xs" id="chapterTitle">未选择章节</div>
                    </div>
                    
                    <div class="flex items-center justify-center space-x-3">
                        <span class="status-text text-xs">缩放</span>
                        <input id="scaleRange" type="range" min="30" max="150" value="100" class="rounded-lg appearance-none cursor-pointer h-3">
                        <span id="scaleLabel" class="progress-text w-12 text-xs text-center">100%</span>
                    </div>
                </div>

                <div class="flex justify-center space-x-3 mt-2">
                    <button id="prevBtn" class="glass-btn rounded-xl px-3 py-1.5 text-xs">
                        上一章
                    </button>
                    <button id="nextBtn" class="primary-btn rounded-xl shadow-lg px-3 py-1.5 text-xs">
                        下一章
                    </button>
                    <button id="scrollTop" class="glass-btn rounded-xl px-3 py-1.5 text-xs">
                        回到顶部
                    </button>
                </div>
            </div>

            <div id="reader" class="reader flex-grow overflow-y-auto outline-none pt-14 pb-16" tabindex="0">
                <div id="empty" class="empty-state glass rounded-2xl mx-4">
                    <svg class="mx-auto" fill="none" stroke="#8b7765" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18s-3.332.477-4.5 1.253"></path></svg>
                    <div class="empty-state-title">请先选择漫画系列和章节</div>
                    <div class="empty-state-desc">侧边栏包含您所有的本地漫画系列和章节</div>
                </div>
            </div>
            
             <div class="footer absolute bottom-0 left-0 right-0 z-30 glass rounded-t-2xl px-6 py-2 transition-all duration-300 ease-out transform">
                <div class="flex flex-row justify-between items-center">
                    <div class="status-text text-xs" id="status">状态：未加载</div>
                    <div class="flex items-center space-x-2">
                        <button id="retryFailedBtn" class="status-text text-xs opacity-60 hover:opacity-100 transition-opacity px-2 py-1 rounded hover:bg-white/20" title="重试所有失败的图片" style="display:none;">
                            🔄 重试失败
                        </button>
                        <div class="progress-text px-3 py-1 glass rounded-full cursor-pointer hover:bg-white/30 transition-colors text-xs" title="点击跳转页码 (或按 G 键)" id="progressStatus">0 / 0</div>
                    </div>
                    <div class="status-text text-xs opacity-60">本地阅读器</div>
                </div>
            </div>

                    <!-- 跳转页码弹窗 -->
                    <div id="jumpModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden items-center justify-center">
                        <div class="glass-strong rounded-2xl p-6 w-72 shadow-2xl">
                            <div class="text-center mb-4">
                                <div class="title text-lg">跳转页码</div>
                                <div class="chapter-title text-sm mt-1">共 <span id="totalPages">0</span> 页</div>
                            </div>
                            <input id="jumpPageInput" type="number" min="1"
                                   class="w-full glass-input rounded-xl text-center text-lg mb-4"
                                   placeholder="输入页码">
                            <div class="flex space-x-3">
                                <button id="jumpCancelBtn" class="flex-1 glass-btn rounded-xl">取消</button>
                                <button id="jumpConfirmBtn" class="flex-1 primary-btn rounded-xl">跳转</button>
                            </div>
                            <div class="mt-3 text-center">
                                <span class="text-xs status-text opacity-50">按 G 键或点击状态栏打开跳转</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (async function () {
            // --- UI 元素引用 (保持不变) ---
            const reader = document.getElementById('reader');
            const preloaderContainer = document.getElementById('preloader-container');
            const chaptersEl = document.getElementById('chapters');
            const seriesList = document.getElementById('seriesList');
            const seriesTitle = document.getElementById('seriesTitle');
            const chapterTitle = document.getElementById('chapterTitle');
            const status = document.getElementById('status');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const scrollTopBtn = document.getElementById('scrollTop');
            const filterInput = document.getElementById('filter');
            const scaleRange = document.getElementById('scaleRange');
            const scaleLabel = document.getElementById('scaleLabel');
            const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
            const sidebar = document.getElementById('sidebar');
            const progressStatusEl = document.getElementById('progressStatus'); 
            const header = document.querySelector('.header');
            const footer = document.querySelector('.footer');
            const emptyDiv = document.getElementById('empty'); 

            // --- 状态变量和常量 (保持不变) ---
            const FRONT_END_PAGE_SIZE = 5;
            const PRELOAD_SIZE = 5; 
            const MAX_IMAGES_TO_FETCH = 500; 

            let scale = 100;
            let series = []; 
            let allFlatChapters = []; 
            let chapterTree = []; 
            let currentSeries = ''; 
            let currentIndex = -1; 
            
            let allChapterFiles = [];
            let imagesLoadedCount = 0;      
            
            let isLoading = false;
            
            let lastScrollPos = 0; 
            const SCROLL_DIRECTION_THRESHOLD = 50; 
            const SCROLL_LOAD_THRESHOLD = 300;     

            let nextChapterFilesCache = null; 
            let nextChapterIndex = -1;

            // ==========================================================
            //                 📊 阅读进度状态管理
            // ==========================================================
            const progressState = {
                // 当前进度数据
                currentPage: 1,           // 当前页码（1-based）
                totalPages: 0,             // 总页数
                loadedPages: 0,           // 已加载页数
                scrollPercent: 0,          // 滚动百分比
                lastReadTime: 0,          // 最后阅读时间戳

                // 初始化进度状态
                init(total) {
                    this.totalPages = total;
                    this.currentPage = 1;
                    this.loadedPages = 0;
                    this.scrollPercent = 0;
                    this.lastReadTime = Date.now();
                },

                // 更新当前页码
                setCurrentPage(page) {
                    this.currentPage = Math.max(1, Math.min(page, this.totalPages));
                    this.lastReadTime = Date.now();
                    this.saveToStorage();
                },

                // 更新已加载页数
                setLoadedPages(count) {
                    this.loadedPages = Math.min(count, this.totalPages);
                },

                // 更新滚动进度
                updateScrollPercent(percent) {
                    this.scrollPercent = Math.max(0, Math.min(100, percent));
                    this.lastReadTime = Date.now();
                },

                // 获取进度显示文本
                getDisplayText() {
                    const percent = this.totalPages > 0
                        ? Math.round((this.currentPage / this.totalPages) * 100)
                        : 0;
                    return `${this.currentPage} / ${this.totalPages} (${percent}%)`;
                },

                // 获取简要文本
                getBriefText() {
                    return `${this.currentPage} / ${this.totalPages}`;
                },

                // 保存进度到本地存储
                saveToStorage() {
                    if (!currentSeries || currentIndex < 0) return;
                    const key = `progress_${currentSeries}_${currentIndex}`;
                    const data = {
                        page: this.currentPage,
                        scrollPercent: this.scrollPercent,
                        timestamp: this.lastReadTime
                    };
                    try {
                        localStorage.setItem(key, JSON.stringify(data));
                    } catch (e) {
                        console.warn('保存阅读进度失败:', e);
                    }
                },

                // 从本地存储恢复进度
                restoreFromStorage(series, index) {
                    if (!series || index < 0) return null;
                    const key = `progress_${series}_${index}`;
                    try {
                        const data = localStorage.getItem(key);
                        if (data) {
                            const parsed = JSON.parse(data);
                            this.currentPage = parsed.page || 1;
                            this.scrollPercent = parsed.scrollPercent || 0;
                            this.lastReadTime = parsed.timestamp || 0;
                            return parsed;
                        }
                    } catch (e) {
                        console.warn('恢复阅读进度失败:', e);
                    }
                    return null;
                },

                // 获取指定系列所有章节的阅读进度
                getSeriesProgress(seriesName) {
                    if (!seriesName) return {};
                    const progress = {};
                    try {
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            if (key && key.startsWith(`progress_${seriesName}_`)) {
                                const data = JSON.parse(localStorage.getItem(key));
                                const chapterIndex = parseInt(key.split('_').pop());
                                progress[chapterIndex] = {
                                    page: data.page,
                                    percent: data.scrollPercent,
                                    timestamp: data.timestamp
                                };
                            }
                        }
                    } catch (e) {
                        console.warn('获取系列阅读进度失败:', e);
                    }
                    return progress;
                },

                // 清除当前章节的进度记录
                clearCurrentProgress() {
                    if (!currentSeries || currentIndex < 0) return;
                    const key = `progress_${currentSeries}_${currentIndex}`;
                    localStorage.removeItem(key);
                }
            };

            const setStatus = (t) => status.textContent = '状态：' + t;
            
            // --- 侧边栏控制 ---
            sidebar.classList.add('hidden');
            
            function toggleSidebar() {
                if (sidebar.classList.contains('hidden')) {
                    sidebar.classList.remove('hidden');
                    toggleSidebarBtn.textContent = '✕';
                } else {
                    sidebar.classList.add('hidden');
                    toggleSidebarBtn.textContent = '☰';
                }
            }
            
            toggleSidebarBtn.onclick = toggleSidebar;
            
            // --- 1. 载入漫画系列 ---
            async function loadSeries() {
                try {
                    seriesList.innerHTML = '<div class="p-3 text-center" style="color: rgba(92, 85, 71, 0.7);">正在加载...</div>';
                    const res = await fetch('/api/series');
                    if (!res.ok) throw new Error('Network response was not ok');

                    series = await res.json();
                    
                    renderSeries(series);
                    setStatus(`已加载系列：${series.length}`);
                } catch (error) {
                    seriesList.innerHTML = '<div class="p-2 text-red-400">错误：无法连接到后端或加载系列列表。</div>';
                    setStatus('错误：无法加载系列列表');
                    console.error('Error loading series:', error);
                }
            }

            // 渲染系列列表 (保持不变)
            function renderSeries(list) {
                seriesList.innerHTML = '';
                if (list.length === 0) {
                        seriesList.innerHTML = '<div class="status-text" style="text-align: center;">未找到漫画系列</div>';
                }
                list.forEach(s => {
                    const div = document.createElement('div');
                    div.className = `list-item series-item ${s === currentSeries ? 'selected' : ''}`;
                    div.textContent = s;
                    div.onclick = () => selectSeries(s);
                    seriesList.appendChild(div);
                });
            }
            
            // --- 辅助: 根据扁平章节列表构建树形结构 (保持不变) ---
            function naturalSort(text) {
                return text.split(/(\d+)/).map(c => parseInt(c) || c);
            }

            function buildChapterTree(flatChapters) {
                const root = { name: 'root', children: {} };
                const expandedPaths = JSON.parse(localStorage.getItem('expandedPaths') || '{}');

                flatChapters.forEach((chapter, index) => {
                    const parts = chapter.path_id.split(/[\\/]/).filter(p => p); 
                    let current = root;
                    let fullPath = '';

                    parts.forEach((part, i) => {
                        fullPath = fullPath ? `${fullPath}/${part}` : part;

                        if (!current.children[part]) {
                            current.children[part] = {
                                name: part,
                                fullPath: fullPath,
                                children: {},
                                isChapter: (i === parts.length - 1),
                                flatIndex: (i === parts.length - 1) ? index : null, 
                                path_id: (i === parts.length - 1) ? chapter.path_id : null,
                                isExpanded: expandedPaths[fullPath] !== false,
                            };
                        }
                        current = current.children[part];
                    });
                });

                const sortChildren = (node) => {
                    const childrenArray = Object.values(node.children);
                    
                    childrenArray.sort((a, b) => {
                        // 目录排在前面
                        if (!a.isChapter && b.isChapter) return -1;
                        if (a.isChapter && !b.isChapter) return 1;
                        
                        const naturalKeysA = naturalSort(a.name);
                        const naturalKeysB = naturalSort(b.name);
                        
                        for (let i = 0; i < Math.min(naturalKeysA.length, naturalKeysB.length); i++) {
                            if (naturalKeysA[i] < naturalKeysB[i]) return -1;
                            if (naturalKeysA[i] > naturalKeysB[i]) return 1;
                        }
                        return naturalKeysA.length - naturalKeysB.length;
                    });
                    
                    childrenArray.forEach(sortChildren);
                    node.children = childrenArray;
                };

                sortChildren(root);
                return root.children;
            }


            // --- 2. 选择系列并加载扁平化章节列表 (保持不变) ---
            async function fetchAndRenderChapters(name) {
                chapterTitle.textContent = '加载中...';
                setStatus('加载章节...');
                    chaptersEl.innerHTML = '<div class="status-text" style="text-align: center;">正在加载章节...</div>';

                try {
                    const chaptersRes = await fetch(`/api/chapters/${encodeURIComponent(name)}`);
                    if (!chaptersRes.ok) throw new Error('Failed to load chapters');

                    allFlatChapters = await chaptersRes.json();
                    
                    chapterTree = buildChapterTree(allFlatChapters); 
                    
                    renderChapters(chapterTree);
                    chapterTitle.textContent = `共 ${allFlatChapters.length} 章`;
                    reader.innerHTML = '';
                    emptyDiv.style.display = 'flex';
                    resetLoadingState();

                } catch (error) {
                    chaptersEl.innerHTML = '<div class="p-2 text-red-400">错误：无法加载章节数据。</div>';
                    setStatus('错误：无法加载章节数据');
                    console.error('Error loading flat chapters:', error);
                }
            }

            async function selectSeries(name) {
                if (currentSeries === name) return; 

                currentSeries = name;
                seriesTitle.textContent = name;
                
                await fetchAndRenderChapters(name);
                
                renderSeries(series); 
                localStorage.setItem('currentSeries', name);
            }
            
            // --- 树形列表辅助函数 (保持不变) ---
            function findNodeInTree(tree, fullPath) {
                for (const node of tree) {
                    if (node.fullPath === fullPath) {
                        return node;
                    }
                    if (node.children && node.children.length > 0 && !node.isChapter) {
                        const found = findNodeInTree(node.children, fullPath);
                        if (found) return found;
                    }
                }
                return null;
            }

            function toggleVolume(fullPath) {
                const node = findNodeInTree(chapterTree, fullPath);
                if (node) {
                    node.isExpanded = !node.isExpanded;
                    const expandedPaths = JSON.parse(localStorage.getItem('expandedPaths') || '{}');
                    expandedPaths[fullPath] = node.isExpanded;
                    localStorage.setItem('expandedPaths', JSON.stringify(expandedPaths));
                    
                    renderChapters(chapterTree, filterInput.value);
                }
            }
            
            function containsFilteredChapters(node, lowerFilter) {
                if (node.isChapter) {
                    return node.name.toLowerCase().includes(lowerFilter);
                }
                if (node.children && node.children.length > 0) {
                    return node.children.some(child => containsFilteredChapters(child, lowerFilter));
                }
                return false;
            }

            // --- 3. 渲染树形章节列表 (保持不变) ---
            function renderChapters(tree, filterText = '') {
                chaptersEl.innerHTML = '';
                const lowerFilter = filterText.toLowerCase();

                if (tree.length === 0) {
                    chaptersEl.innerHTML = '<div class="status-text" style="text-align: center;">暂无章节</div>';
                    return;
                }
                
                let selectedChapterDiv = null;

                function renderNode(node, depth = 0) {
                    if (lowerFilter && !containsFilteredChapters(node, lowerFilter)) {
                        return;
                    }

                    if (!node.isChapter) {
                        const titleDiv = document.createElement('div');
                        const isExpanded = node.isExpanded || lowerFilter;
                        titleDiv.className = `volume-title ${isExpanded ? '' : 'collapsed'}`;
                        titleDiv.style.paddingLeft = `${10 + depth * 15}px`; 
                        titleDiv.innerHTML = `
                            <span class="toggle-icon">${isExpanded ? '▼' : '▶'}</span>
                            ${node.name}
                        `;
                        titleDiv.onclick = (e) => {
                            e.stopPropagation();
                            if (!lowerFilter) {
                                toggleVolume(node.fullPath);
                            }
                        };
                        chaptersEl.appendChild(titleDiv);
                        
                        if (isExpanded) {
                             node.children.forEach(child => renderNode(child, depth + 1));
                        }

                    } 
                    else if (node.isChapter) {
                        if (lowerFilter && !node.name.toLowerCase().includes(lowerFilter)) {
                            return;
                        }
                        
                        const isSelected = node.flatIndex === currentIndex;
                        
                        const div = document.createElement('div');
                        div.className = `list-item chapter-item ${isSelected ? 'selected' : ''}`; 
                        div.style.paddingLeft = `${20 + depth * 15}px`; 
                        
                        if (node.flatIndex !== null) {
                            div.onclick = () => openChapter(node.flatIndex, true);
                        }
                        
                        const dot = document.createElement('div');
                        dot.className = 'chapter-dot';
                        
                        const textSpan = document.createElement('span');
                        textSpan.textContent = node.name;

                        div.appendChild(dot);
                        div.appendChild(textSpan);
                        
                        chaptersEl.appendChild(div);
                        
                        if (isSelected) {
                            selectedChapterDiv = div;
                        }
                    }
                }
                
                tree.forEach(node => renderNode(node));

                if (selectedChapterDiv) {
                    setTimeout(() => {
                        selectedChapterDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }
            }
            
            filterInput.addEventListener('input', () => {
                if (!currentSeries || chapterTree.length === 0) return;
                renderChapters(chapterTree, filterInput.value);
            });
            
            
            // ==========================================================
            //                 🚀 新增辅助函数：判断文件类型
            // ==========================================================

            const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp'];
            const VIDEO_EXTENSIONS = ['.mp4', '.mov'];

            function isImageFile(filename) {
                const lowerFilename = filename.toLowerCase();
                return IMAGE_EXTENSIONS.some(ext => lowerFilename.endsWith(ext));
            }
            
            function isVideoFile(filename) {
                const lowerFilename = filename.toLowerCase();
                return VIDEO_EXTENSIONS.some(ext => lowerFilename.endsWith(ext));
            }

            // ==========================================================
            //                 🚀 懒加载核心实现
            // ==========================================================

            // 懒加载配置
            const LAZY_LOAD_CONFIG = {
                ROOT_MARGIN: '2000px',      // 视窗外 1500px 开始加载
                INITIAL_BATCH: 30,          // 初始加载 30 张
                BATCH_SIZE: 20,              // 每次观察 20 个新元素
            };

            // 图片加载重试配置
            const IMAGE_RETRY_CONFIG = {
                MAX_RETRIES: 3,             // 最大重试次数
                INITIAL_DELAY: 1000,        // 初始延迟 (ms)
                MAX_DELAY: 10000,           // 最大延迟 (ms)
                BACKOFF_MULTIPLIER: 2,      // 延迟倍数
            };

            // 懒加载状态
            let lazyLoadState = {
                observer: null,             // Intersection Observer
                nextToObserve: 0,           // 下一个要观察的索引
                loadedCount: 0,             // 已加载数量
                isObserving: false          // 是否正在观察
            };

            // 图片加载重试状态管理
            const imageRetryState = new Map();

            /**
             * 获取容器的重试状态
             */
            function getRetryState(container) {
                if (!imageRetryState.has(container)) {
                    imageRetryState.set(container, {
                        retries: 0,
                        status: 'idle',     // idle, loading, retrying, failed, success
                        lastError: null,
                        timeoutId: null
                    });
                }
                return imageRetryState.get(container);
            }

            /**
             * 计算重试延迟时间 (指数退避)
             */
            function getRetryDelay(retries) {
                const delay = IMAGE_RETRY_CONFIG.INITIAL_DELAY *
                    Math.pow(IMAGE_RETRY_CONFIG.BACKOFF_MULTIPLIER, retries);
                return Math.min(delay, IMAGE_RETRY_CONFIG.MAX_DELAY);
            }

            /**
             * 更新重试状态UI显示
             */
            function updateRetryStatus(container, state) {
                const statusEl = container.querySelector('.retry-status');
                if (!statusEl) return;

                switch (state.status) {
                    case 'retrying':
                        statusEl.textContent = `重试 ${state.retries}/${IMAGE_RETRY_CONFIG.MAX_RETRIES}`;
                        statusEl.className = 'retry-status text-amber-500 text-xs';
                        break;
                    case 'failed':
                        statusEl.textContent = '加载失败';
                        statusEl.className = 'retry-status text-red-500 text-xs';
                        break;
                    default:
                        statusEl.textContent = '';
                }
            }

            /**
             * 懒加载观察器回调
             */
            function lazyLoadCallback(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const container = entry.target;
                        const retryState = imageRetryState.get(container);

                        // 如果正在重试中，不重复触发
                        if (retryState && retryState.status === 'retrying') {
                            return;
                        }

                        // 如果已经成功加载，跳过
                        if (retryState && retryState.status === 'success') {
                            return;
                        }

                        // 如果是失败状态且还有重试次数，进行重试
                        if (retryState && retryState.status === 'failed') {
                            if (retryState.retries < IMAGE_RETRY_CONFIG.MAX_RETRIES) {
                                loadImageElement(container, { forceRetry: true });
                                return;
                            }
                        }

                        // 正常加载
                        loadImageElement(container);
                    }
                });
            }

            /**
             * 重试所有失败的图片
             */
            function retryAllFailedImages() {
                const failedContainers = [];
                const containers = reader.querySelectorAll('.lazy-image-container');

                containers.forEach(container => {
                    const state = imageRetryState.get(container);
                    if (state && state.status === 'failed' && state.retries >= IMAGE_RETRY_CONFIG.MAX_RETRIES) {
                        failedContainers.push(container);
                    }
                });

                if (failedContainers.length === 0) {
                    setStatus('没有失败的图片需要重试');
                    return;
                }

                setStatus(`正在重试 ${failedContainers.length} 张失败的图片...`);

                failedContainers.forEach((container, index) => {
                    setTimeout(() => {
                        loadImageElement(container, { forceRetry: true });
                    }, index * 500); // 错开重试时间
                });
            }

            /**
             * 获取加载统计信息
             */
            function getLoadingStats() {
                let total = 0;
                let loaded = 0;
                let failed = 0;
                let retrying = 0;

                imageRetryState.forEach((state) => {
                    if (state.status !== 'idle') {
                        total++;
                        if (state.status === 'success') loaded++;
                        if (state.status === 'failed') failed++;
                        if (state.status === 'retrying') retrying++;
                    }
                });

                return { total, loaded, failed, retrying };
            }

            /**
             * 构建媒体文件URL
             */
            function buildMediaUrl(filename, pathId, seriesName, isVideo) {
                if (isVideo) {
                    if (pathId) {
                        return `/video/${encodeURIComponent(seriesName)}/${encodeURIComponent(pathId)}/${encodeURIComponent(filename)}`;
                    }
                    return `/video/${encodeURIComponent(seriesName)}/${encodeURIComponent(filename)}`;
                }
                return `/api/image/${encodeURIComponent(seriesName)}/${encodeURIComponent(filename)}?chapterPath=${encodeURIComponent(pathId)}`;
            }

            /**
             * 清理容器中的媒体元素
             */
            function clearMediaElement(container) {
                const existingElement = container.querySelector('img, video');
                if (existingElement) {
                    existingElement.src = '';
                    existingElement.load && existingElement.load();
                }
                container.innerHTML = '';
            }

            /**
             * 加载单个图片/视频元素（带重试机制）
             */
            function loadImageElement(container, options = {}) {
                const { filename, pathId, seriesName } = container.dataset;
                const isVideo = isVideoFile(filename);
                const isImage = isImageFile(filename);

                if (!isImage && !isVideo) return;

                // 获取或初始化重试状态
                const retryState = getRetryState(container);
                const forceRetry = options.forceRetry === true;

                // 如果已经成功加载且不是强制重试，则跳过
                if (retryState.status === 'success' && !forceRetry) {
                    return;
                }

                // 如果达到最大重试次数且不是强制重试，则跳过
                if (retryState.retries >= IMAGE_RETRY_CONFIG.MAX_RETRIES &&
                    retryState.status === 'failed' && !forceRetry) {
                    return;
                }

                // 强制重置状态
                if (forceRetry) {
                    retryState.retries = 0;
                    retryState.status = 'loading';
                    retryState.lastError = null;
                    container.dataset.loaded = 'false';
                    container.classList.remove('loaded', 'failed');
                }

                // 构建URL
                const url = buildMediaUrl(filename, pathId, seriesName, isVideo);

                // 清理容器
                clearMediaElement(container);

                // 添加重试状态显示
                if (retryState.retries > 0) {
                    let statusEl = container.querySelector('.retry-status');
                    if (!statusEl) {
                        statusEl = document.createElement('div');
                        statusEl.className = 'retry-status';
                        statusEl.style.cssText = 'position:absolute;bottom:8px;right:8px;padding:4px 8px;background:rgba(0,0,0,0.6);border-radius:4px;font-size:12px;z-index:10;';
                        container.style.position = 'relative';
                        container.appendChild(statusEl);
                    }
                    updateRetryStatus(container, retryState);
                }

                // 创建媒体元素
                let element;
                if (isVideo) {
                    element = document.createElement('video');
                    element.className = 'reader-img';
                    element.controls = true;
                    element.autoplay = false;
                    element.loop = false;
                    element.preload = 'metadata';
                    element.style.maxHeight = '80vh';
                    element.style.width = scale + '%';
                } else {
                    element = document.createElement('img');
                    element.className = 'reader-img';
                    element.loading = 'lazy';
                    element.decoding = 'async';
                    element.style.width = scale + '%';
                }

                // 加载成功回调
                const onSuccess = () => {
                    // 清理定时器
                    if (retryState.timeoutId) {
                        clearTimeout(retryState.timeoutId);
                        retryState.timeoutId = null;
                    }

                    retryState.status = 'success';
                    retryState.retries = 0;

                    container.classList.add('loaded');
                    container.classList.remove('failed');
                    lazyLoadState.loadedCount++;

                    // 移除重试状态显示
                    const statusEl = container.querySelector('.retry-status');
                    if (statusEl && retryState.retries > 0) {
                        statusEl.remove();
                    }

                    updateProgressStatus();
                    updateRetryButtonVisibility();
                    observeNextBatch();
                };

                // 加载失败回调（带重试逻辑）
                const onError = (error) => {
                    retryState.lastError = error;
                    retryState.retries++;

                    if (retryState.retries >= IMAGE_RETRY_CONFIG.MAX_RETRIES) {
                        // 达到最大重试次数
                        retryState.status = 'failed';

                        container.classList.add('loaded', 'failed');
                        lazyLoadState.loadedCount++;

                        // 显示失败状态
                        updateRetryStatus(container, retryState);

                        console.warn(`[图片加载] 达到最大重试次数 (${IMAGE_RETRY_CONFIG.MAX_RETRIES}):`, {
                            filename,
                            pathId,
                            seriesName
                        });

                        updateProgressStatus();
                        updateRetryButtonVisibility();
                        observeNextBatch();
                    } else {
                        // 需要重试
                        retryState.status = 'retrying';
                        const delay = getRetryDelay(retryState.retries);

                        console.log(`[图片加载] 第 ${retryState.retries}/${IMAGE_RETRY_CONFIG.MAX_RETRIES} 次重试，${delay}ms 后重试:`, {
                            filename,
                            url
                        });

                        // 更新UI显示
                        updateRetryStatus(container, retryState);

                        // 设置重试定时器
                        retryState.timeoutId = setTimeout(() => {
                            retryState.timeoutId = null;
                            retryState.status = 'loading';
                            loadImageElement(container, { forceRetry: true });
                        }, delay);
                    }
                };

                // 设置事件监听器
                if (isVideo) {
                    element.onloadeddata = onSuccess;
                    element.onerror = () => onError('video_load_error');
                } else {
                    element.onload = onSuccess;
                    element.onerror = () => onError('image_load_error');
                }

                // 添加超时保护（10秒）
                const timeoutId = setTimeout(() => {
                    if (retryState.status === 'loading') {
                        console.warn(`[图片加载] 超时:`, { filename, url });
                        element.src = ''; // 取消当前加载
                        onError('timeout');
                    }
                }, 10000);

                // 保存超时ID用于清理
                element._timeoutId = timeoutId;

                container.appendChild(element);
                element.src = url;

                container.dataset.loaded = 'true';
            }

            /**
             * 观察下一批元素
             */
            function observeNextBatch() {
                if (!lazyLoadState.observer) return;
                
                // 获取所有容器
                const allContainers = reader.querySelectorAll('.lazy-image-container');
                const totalContainers = allContainers.length;
                
                // 观察范围内的元素
                const endIndex = Math.min(
                    lazyLoadState.nextToObserve + LAZY_LOAD_CONFIG.BATCH_SIZE,
                    totalContainers
                );
                
                let observedCount = 0;
                for (let i = lazyLoadState.nextToObserve; i < endIndex; i++) {
                    const container = allContainers[i];
                    if (container && container.dataset.loaded !== 'true') {
                        lazyLoadState.observer.observe(container);
                        observedCount++;
                    }
                    lazyLoadState.nextToObserve = i + 1;
                }
                
                // 更新状态
                lazyLoadState.nextToObserve = endIndex;
                
                // 如果没观察到东西但还有容器，尝试继续观察
                if (observedCount === 0 && lazyLoadState.nextToObserve < totalContainers) {
                    observeNextBatch();
                }
            }

            /**
             * 初始观察一批元素
             */
            function observeInitialBatch() {
                if (!lazyLoadState.observer) return;
                
                const allContainers = reader.querySelectorAll('.lazy-image-container');
                const endIndex = Math.min(LAZY_LOAD_CONFIG.INITIAL_BATCH, allContainers.length);
                
                for (let i = 0; i < endIndex; i++) {
                    const container = allContainers[i];
                    if (container) {
                        lazyLoadState.observer.observe(container);
                    }
                }
                
                lazyLoadState.nextToObserve = endIndex;
            }

            /**
             * 初始化懒加载观察器
             */
            function initLazyObserver() {
                // 断开旧观察器
                if (lazyLoadState.observer) {
                    lazyLoadState.observer.disconnect();
                }
                
                // 创建新观察器
                lazyLoadState.observer = new IntersectionObserver(
                    lazyLoadCallback,
                    {
                        rootMargin: LAZY_LOAD_CONFIG.ROOT_MARGIN,
                        threshold: 0
                    }
                );
                
                // 重置状态
                lazyLoadState.nextToObserve = 0;
                lazyLoadState.loadedCount = 0;
            }

            /**
             * 清理懒加载状态
             */
            function cleanupLazyLoad() {
                if (lazyLoadState.observer) {
                    lazyLoadState.observer.disconnect();
                    lazyLoadState.observer = null;
                }

                // 清理重试定时器
                imageRetryState.forEach((state, container) => {
                    if (state.timeoutId) {
                        clearTimeout(state.timeoutId);
                    }
                });

                // 清空重试状态映射
                imageRetryState.clear();

                // 隐藏重试按钮
                const retryFailedBtn = document.getElementById('retryFailedBtn');
                if (retryFailedBtn) {
                    retryFailedBtn.style.display = 'none';
                }

                lazyLoadState.nextToObserve = 0;
                lazyLoadState.loadedCount = 0;
                
                // 清理阅读器中的懒加载容器
                reader.querySelectorAll('.lazy-image-container').forEach(c => c.remove());
                hideEndMarker();
            }

             // ==========================================================
            //                 🚀 懒加载入口函数
            // ==========================================================

            /**
             * 显示结束标记
             */
            function showEndMarker() {
                const marker = document.createElement('div');
                marker.id = 'end-marker';
                marker.className = 'end-sentinel';
                marker.textContent = '— 已经到底了 —';
                marker.style.cssText = 'height: 40px; display: flex; align-items: center; justify-content: center; color: #8b7765; font-size: var(--font-size-small); font-weight: var(--font-weight-light); letter-spacing: 0.1em; opacity: 0.7; padding: 16px;';
                reader.appendChild(marker);
            }

            /**
             * 隐藏结束标记
             */
            function hideEndMarker() {
                const marker = reader.querySelector('#end-marker');
                if (marker) marker.remove();
            }

            /**
             * 加载指定索引的图片（用于跳转）
             */
            function loadImageAtIndex(targetIndex) {
                const container = reader.querySelector(`.lazy-image-container[data-index="${targetIndex}"]`);
                if (container && container.dataset.loaded === 'false') {
                    loadImageElement(container);
                }
            }

            // ==========================================================
            //                 🚀 懒加载入口函数
            // ==========================================================

             /**
              * 使用懒加载方式渲染章节
              * 替换原来的分批加载
              */
             async function renderChapterWithLazyLoad(chapterData) {
                isLoading = true;

                const seriesName = currentSeries;
                const { path_id } = chapterData;

                // === 初始化阅读进度状态 ===
                progressState.init(allChapterFiles.length);

                // 从本地存储恢复阅读进度
                const savedProgress = progressState.restoreFromStorage(currentSeries, currentIndex);
                if (savedProgress) {
                    setStatus(`已恢复阅读进度：第 ${savedProgress.page} 页`);
                    // 跳转到保存的阅读位置
                    setTimeout(() => {
                        if (savedProgress.page > 1) {
                            jumpToPageWithLazyLoad(savedProgress.page);
                        }
                    }, 100);
                }

                // 1. 清理之前的懒加载状态
                cleanupLazyLoad();
                 
                // 2. 初始化懒加载观察器
                initLazyObserver();
                
                // 3. 创建所有懒加载容器（骨架屏）
                const fragment = document.createDocumentFragment();
                
                allChapterFiles.forEach((filename, index) => {
                    const container = document.createElement('div');
                    container.className = 'lazy-image-container';
                    container.dataset.index = index;
                    container.dataset.filename = filename;
                    container.dataset.pathId = path_id;
                    container.dataset.seriesName = seriesName;
                    container.dataset.loaded = 'false';
                    
                    // 骨架屏
                    container.innerHTML = `
                        <div class="skeleton-wrapper">
                            <div class="skeleton-image skeleton" style="height: 200px;"></div>
                        </div>
                    `;
                    
                    fragment.appendChild(container);
                });
                
                reader.appendChild(fragment);
                
                // 4. 初始观察一批元素
                observeNextBatch();

                // 5. 预加载下一章元数据
                preloadNextChapterMetadata();

                setStatus(`章节加载完成,共 ${allChapterFiles.length} 个文件`);
                isLoading = false;
                updateProgressStatus();
            }

            // ==========================================================
            //                 🚀 重写页码跳转逻辑
            // ==========================================================

            const JUMP_CONFIG = {
                PRELOAD_AROUND: 3,      // 跳转后预加载周围图片数量
                LOAD_TIMEOUT: 5000,     // 加载超时时间
            };

            /**
             * 跳转到指定页码（全新重写版本）
             * 1. 强制立即加载目标图片
             * 2. 预加载周围图片
             * 3. 提供加载状态反馈
             */
            function jumpToPageWithLazyLoad(pageNum) {
                if (pageNum < 1 || pageNum > allChapterFiles.length) return;

                const targetIndex = pageNum - 1;
                const targetElement = reader.querySelector(`.lazy-image-container[data-index="${targetIndex}"]`);

                if (targetElement) {
                    // 显示加载状态
                    setStatus(`正在跳转至第 ${pageNum} 页...`);

                    // 1. 强制立即加载目标图片
                    loadImageAtIndexWithForce(targetIndex);

                    // 2. 预加载周围图片
                    preloadImagesAround(targetIndex);

                    // 3. 直接跳转到目标位置
                    targetElement.scrollIntoView({ behavior: 'auto', block: 'start' });

                    // 4. 更新状态
                    setTimeout(() => {
                        updateProgressStatus();
                        setStatus(`已跳转至第 ${pageNum} 页`);
                    }, 100);
                } else {
                    // 元素不存在时的后备方案
                    reader.scrollTop = targetIndex * 300;
                }
            }

            /**
             * 强制加载指定索引的图片
             */
            function loadImageAtIndexWithForce(index) {
                const container = reader.querySelector(`.lazy-image-container[data-index="${index}"]`);
                if (container && container.dataset.loaded === 'false') {
                    loadImageElement(container);
                }
            }

            /**
             * 预加载目标周围指定数量的图片
             */
            function preloadImagesAround(targetIndex) {
                // 边界检查：空数组直接返回
                if (allChapterFiles.length === 0) return;

                const start = Math.max(0, targetIndex - JUMP_CONFIG.PRELOAD_AROUND);
                const end = Math.min(allChapterFiles.length - 1, targetIndex + JUMP_CONFIG.PRELOAD_AROUND);

                for (let i = start; i <= end; i++) {
                    if (i !== targetIndex) {
                        loadImageAtIndexWithForce(i);
                    }
                }
            }

            /**
             * 键盘快捷键 G 跳转
             */
            function showJumpModalWithKeyboard() {
                if (allChapterFiles.length === 0) return;
                showJumpModal();
            }

            // ==========================================================
            //                 🚀 预加载逻辑
            // ==========================================================

            // 清理预加载容器
            function clearPreloader() {
                preloaderContainer.innerHTML = '';
            }

            // 文件预加载 (Preload next batch of images)
            function preloadNextBatch(startIndex, count) {
                clearPreloader();
                
                const seriesName = currentSeries;
                const chapterData = allFlatChapters[currentIndex];
                const { path_id } = chapterData;
                
                const endIndex = Math.min(startIndex + count, allChapterFiles.length);
                const filesToPreload = allChapterFiles.slice(startIndex, endIndex);
                
                if (filesToPreload.length > 0) {
                    console.log(`Preloading ${filesToPreload.length} files starting from index ${startIndex}...`);
                } else {
                    return;
                }

                filesToPreload.forEach(filename => {
                    // 仅预加载图片
                    if (isImageFile(filename)) {
                        const fileUrl = `/api/image/${encodeURIComponent(seriesName)}/${encodeURIComponent(filename)}?chapterPath=${encodeURIComponent(path_id)}`;
                        
                        const img = document.createElement('img');
                        img.src = fileUrl;
                        img.loading = 'eager';
                        img.style.width = '1px';
                        preloaderContainer.appendChild(img);
                    }
                });
            }
            
            // 下一章元数据预加载
            async function preloadNextChapterMetadata() {
                nextChapterIndex = currentIndex + 1;
                
                if (nextChapterIndex >= allFlatChapters.length) {
                    nextChapterFilesCache = null;
                    console.log("No next chapter to preload metadata for.");
                    return;
                }
                
                const chapterData = allFlatChapters[nextChapterIndex];
                const seriesName = currentSeries;
                const { path_id } = chapterData;

                const chapterUrl = `/api/chapter/${encodeURIComponent(seriesName)}?chapterPath=${encodeURIComponent(path_id)}&page=1&per_page=${MAX_IMAGES_TO_FETCH}`;
                
                console.log(`Preloading metadata for next chapter: ${chapterData.name}`);

                try {
                    const res = await fetch(chapterUrl);
                    if (!res.ok) throw new Error('Failed to load next chapter metadata');
                    
                    const data = await res.json();
                    
                    nextChapterFilesCache = data.files || [];
                    console.log(`Next chapter metadata loaded: ${nextChapterFilesCache.length} files cached.`);
                } catch (error) {
                    nextChapterFilesCache = null;
                    console.error('Error preloading next chapter metadata:', error);
                }
            }
            
            // ==========================================================
            //                 🚀 预加载逻辑 结束
            // ==========================================================


            // --- 4. 打开章节 (保持不变) ---
            async function openChapter(idx, isUiSelection = false) {
                if (isLoading || idx < 0 || idx >= allFlatChapters.length) return;
                
                currentIndex = idx;
                const chapterData = allFlatChapters[idx];
                
                chapterTitle.textContent = chapterData.name;
                setStatus('加载文件元数据...');
                
                renderChapters(chapterTree, filterInput.value); 
                
                resetLoadingState();
                reader.innerHTML = ''; 
                emptyDiv.style.display = 'none';
                
                // 检查是否可以使用预加载的元数据
                if (idx === nextChapterIndex && nextChapterFilesCache) {
                    allChapterFiles = nextChapterFilesCache;
                    setStatus(`章节加载完成（使用缓存）。共 ${allChapterFiles.length} 个文件（懒加载模式）。`);
                    nextChapterFilesCache = null; 
                    
                    // 使用懒加载渲染
                    renderChapterWithLazyLoad(chapterData);
                } else {
                    // 正常加载元数据并使用懒加载
                    await loadChapterDataAndRender(chapterData); 
                }
                
                reader.scrollTop = 0;
                

                localStorage.setItem('currentSeries', currentSeries); 
                localStorage.setItem('currentChapterPathId', chapterData.path_id);
            }

            // --- 懒加载版本：加载章节数据并渲染 ---
            async function loadChapterDataAndRender(chapterData) {
                isLoading = true;
                
                const seriesName = currentSeries; 
                const { path_id } = chapterData; 

                const chapterUrl = `/api/chapter/${encodeURIComponent(seriesName)}?chapterPath=${encodeURIComponent(path_id)}&page=1&per_page=${MAX_IMAGES_TO_FETCH}`;

                try {
                    const res = await fetch(chapterUrl);
                    if (!res.ok) throw new Error(`Failed to load chapter data: ${res.statusText}`);

                    const data = await res.json();
                    
                    if (!data || !data.files) throw new Error("Invalid API response format or missing files array.");

                    allChapterFiles = data.files || [];
                    
                    // 使用懒加载渲染章节
                    renderChapterWithLazyLoad(chapterData);

                } catch (error) {
                    setStatus('错误：加载文件元数据失败');
                    console.error('Error loading files metadata:', error);
                    allChapterFiles = [];
                    reader.innerHTML = '<div class="p-4 text-red-400">无法加载章节文件列表，请检查后端服务。</div>';
                } finally {
                    isLoading = false;
                }
            }
            
            // --- 旧的分批加载函数（已废弃，保留用于参考）---
            function appendNextImages() {
                // 此函数已被懒加载替代
                // 保留空函数体以避免错误
                console.warn('appendNextImages is deprecated, using lazy loading instead');
            }
            
            // ==========================================================
            //                 🚀 懒加载滚动监听
            // ==========================================================

            reader.addEventListener('scroll', () => {
                const st = reader.scrollTop;
                const deltaY = st - lastScrollPos;

                // Header/Footer 隐藏逻辑
                if (Math.abs(deltaY) > SCROLL_DIRECTION_THRESHOLD) {
                    const isHeaderHidden = header.classList.contains('hidden');

                    if (st < 10) {
                        header.classList.remove('hidden');
                        footer.classList.remove('hidden');
                    }
                    else if (deltaY > 0 && !isHeaderHidden) {
                        header.classList.add('hidden');
                        footer.classList.add('hidden');
                    }
                    else if (deltaY < 0 && isHeaderHidden) {
                        header.classList.remove('hidden');
                        footer.classList.remove('hidden');
                    }

                    lastScrollPos = st;
                }

                // 更新阅读进度（防抖）
                updateCurrentPageOnScroll();
            });

            // --- 7. 进度和导航控制 ---

            /**
             * 更新阅读进度显示
             * 显示格式: 当前页/总页数 (百分比%) [已加载数]
             */
            function updateProgressStatus() {
                // 更新进度状态
                progressState.setLoadedPages(lazyLoadState.loadedCount);

                // 构建显示文本
                const displayText = progressState.getDisplayText();
                const briefText = progressState.getBriefText();

                // 更新主显示元素
                progressStatusEl.textContent = briefText;
                progressStatusEl.title = `点击跳转页码 (或按 G 键)\n当前: ${displayText}\n已加载: ${progressState.loadedPages}/${progressState.totalPages}`;

                // 按钮状态更新
                prevBtn.disabled = currentIndex <= 0;
                const nextChapterExists = currentIndex < allFlatChapters.length - 1;
                nextBtn.disabled = !nextChapterExists && !nextChapterFilesCache;

                // 保存滚动进度
                const scrollPercent = allChapterFiles.length > 0
                    ? (reader.scrollTop / (reader.scrollHeight - reader.clientHeight)) * 100
                    : 0;
                progressState.updateScrollPercent(scrollPercent);
            }

            /**
             * 计算当前可视区域中最上面的图片索引（0-based）
             * @returns {number} 当前可见的页码（1-based）
             */
            function calculateCurrentPage() {
                const containers = reader.querySelectorAll('.lazy-image-container');
                if (containers.length === 0) return 1;

                const readerRect = reader.getBoundingClientRect();
                const viewportCenter = readerRect.top + readerRect.height / 2;

                let minDistance = Infinity;
                let closestIndex = 0;

                containers.forEach((container, index) => {
                    const rect = container.getBoundingClientRect();
                    const containerCenter = rect.top + rect.height / 2;
                    const distance = Math.abs(containerCenter - viewportCenter);

                    if (distance < minDistance) {
                        minDistance = distance;
                        closestIndex = index;
                    }
                });

                return closestIndex + 1;
            }

            /**
             * 滚动时更新当前页码（防抖）
             */
            let scrollUpdateTimer = null;
            function updateCurrentPageOnScroll() {
                if (scrollUpdateTimer) return;

                scrollUpdateTimer = setTimeout(() => {
                    const currentPage = calculateCurrentPage();
                    if (currentPage !== progressState.currentPage) {
                        progressState.setCurrentPage(currentPage);
                        progressStatusEl.textContent = progressState.getBriefText();
                    }
                    updateProgressStatus();
                    scrollUpdateTimer = null;
                }, 100);
            }

            function resetLoadingState() {
                allChapterFiles = []; 
                imagesLoadedCount = 0;
                nextChapterFilesCache = null; 
                nextChapterIndex = -1;
                updateProgressStatus();
                isLoading = false; 
                const indicator = document.getElementById('loadingIndicator');
                if (indicator) indicator.remove();
                clearPreloader();
                
                // 清理懒加载状态
                cleanupLazyLoad();
            }
            
            prevBtn.onclick = () => currentIndex > 0 && openChapter(currentIndex - 1);
            nextBtn.onclick = () => currentIndex < allFlatChapters.length - 1 && openChapter(currentIndex + 1);
            scrollTopBtn.onclick = () => reader.scrollTo({ top: 0, behavior: 'smooth' });

            // 重试失败图片按钮
            const retryFailedBtn = document.getElementById('retryFailedBtn');
            retryFailedBtn.onclick = () => retryAllFailedImages();

            /**
             * 更新重试按钮显示状态
             */
            function updateRetryButtonVisibility() {
                let failedCount = 0;
                imageRetryState.forEach((state) => {
                    if (state.status === 'failed' && state.retries >= IMAGE_RETRY_CONFIG.MAX_RETRIES) {
                        failedCount++;
                    }
                });

                if (failedCount > 0) {
                    retryFailedBtn.style.display = 'block';
                    retryFailedBtn.textContent = `🔄 重试失败 (${failedCount})`;
                    retryFailedBtn.title = `点击重试 ${failedCount} 张失败的图片`;
                } else {
                    retryFailedBtn.style.display = 'none';
                }
            }

            // 修改 updateProgressStatus 函数以包含重试按钮更新
            const originalUpdateProgressStatus = updateProgressStatus;
            updateProgressStatus = function() {
                originalUpdateProgressStatus();
                updateRetryButtonVisibility();
            };

            // --- 跳转页码功能 ---
            const jumpModal = document.getElementById('jumpModal');
            const jumpPageInput = document.getElementById('jumpPageInput');
            const jumpCancelBtn = document.getElementById('jumpCancelBtn');
            const jumpConfirmBtn = document.getElementById('jumpConfirmBtn');
            const totalPagesEl = document.getElementById('totalPages');

            function showJumpModal() {
                if (allChapterFiles.length === 0) return;
                totalPagesEl.textContent = allChapterFiles.length;
                jumpPageInput.value = '';
                jumpPageInput.max = allChapterFiles.length;
