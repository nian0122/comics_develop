# ----------------------------------------
# 1. 定义 Nginx 缓存区域
# ----------------------------------------
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m inactive=7d max_size=10g;

server {
    listen 80;
    server_name localhost;

    # 🚀 优化 1: 启用 Gzip 压缩 (对文本内容加速)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # 根路径 (首页) 和 API 路径 (不缓存，直接透传给 web 服务)
    location / {
        proxy_pass http://web:500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------
    # 2. 图片请求优化
    # ----------------------------------------
    location ~ ^/(image|hq_image)/.* {
        proxy_pass http://web:500;
        
        # 启用缓存
        proxy_cache my_cache;
        proxy_cache_key "$scheme$proxy_host$request_uri";
        proxy_cache_lock on;         

        proxy_cache_valid 200 301 302 7d;
        proxy_cache_valid any 1m;

        add_header X-Proxy-Cache $upstream_cache_status;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/hq_image/(.*)$ {
        rewrite ^/hq_image/(.*)$ /comics/$1 break;
        
        root /; 

        try_files $uri =404; 
        
        sendfile on;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ----------------------------------------
    # 3. 🚀 视频文件请求优化 (Nginx 直接服务)
    # ----------------------------------------
    location ~ ^/video/.* {
        rewrite ^/video/(.*)$ /comics/$1 break;
        root /; 
        try_files $uri =404;
        
        # 🚀 优化: 移除所有无用的 proxy_cache 指令 (纯静态文件服务不需要代理缓存)
        
        # 启用 sendfile 提高静态文件传输效率
        sendfile on;
        
        # 浏览器缓存：本地文件不常变动，设置长缓存时间
        expires 7d;
        add_header Cache-Control "public";
    }
}