version: '3.8'

# 生产环境配置
# 特点：资源限制、健康检查、优化镜像

services:
  nginx:
    image: nginx:stable-alpine
    container_name: comic14_nginx_prod
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
      - &comic_mount F:\games\comics:/comics:ro
    depends_on:
      - web

  web:
    build:
      context: ./backend/comic
    container_name: comic14_server_prod
    volumes:
      - *comic_mount
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - COMICS_ROOT_DIR=/comics

  redis:
    image: redis:7-alpine
    container_name: comic14_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  nginx_cache: